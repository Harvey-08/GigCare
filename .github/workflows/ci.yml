name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: gigcare_test
          POSTGRES_USER: gigcare_user
          POSTGRES_PASSWORD: gigcare_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'services/api/package-lock.json'

    - name: Install API dependencies
      run: cd services/api && npm ci

    - name: Run linting
      run: cd services/api && npm run lint

    - name: Run formatting check
      run: cd services/api && npm run format:check

    - name: Run tests
      run: cd services/api && npm test
      env:
        DATABASE_URL: postgresql://gigcare_user:gigcare_pass@localhost:5432/gigcare_test
        JWT_SECRET: test_jwt_secret_for_ci_cd_pipeline
        NODE_ENV: test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker images
      run: docker-compose build --no-cache

    - name: Test Docker compose
      run: |
        docker-compose up -d
        sleep 30
        docker-compose ps
        curl -f http://localhost:3001/health || exit 1
        docker-compose down

  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'