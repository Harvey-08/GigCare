version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: gigcare-postgres
    environment:
      POSTGRES_DB: gigcare
      POSTGRES_USER: gigcare_user
      POSTGRES_PASSWORD: gigcare_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigcare_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gigcare-net

  # Node.js API Server
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: gigcare-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://gigcare_user:gigcare_pass@postgres:5432/gigcare
      NODE_ENV: development
      JWT_SECRET: your_super_secret_jwt_key_here_min_32_chars_change_me_now
      JWT_EXPIRES_IN: 1h
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-none}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-none}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-none}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-none}
      WAQI_TOKEN: ${WAQI_TOKEN:-none}
      ML_PREMIUM_SERVICE_URL: http://ml-premium:5001
      INTERNAL_SERVICE_KEY: internal_service_key_change_me
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      USE_MOCK_DATA: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/api:/app
      - /app/node_modules
    networks:
      - gigcare-net

  # ML Premium Pricing Service
  ml-premium:
    build:
      context: ./services/ml/premium_service
      dockerfile: Dockerfile
    container_name: gigcare-ml-premium
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: development
      FLASK_APP: app.py
    volumes:
      - ./services/ml/premium_service:/app
    networks:
      - gigcare-net

  # ML Fraud Detection Service (Phase 3)
  # ml-fraud:
  #   build:
  #     context: ./services/ml/fraud_service
  #     dockerfile: Dockerfile
  #   container_name: gigcare-ml-fraud
  #   ports:
  #     - "5002:5002"
  #   environment:
  #     FLASK_ENV: development
  #     FLASK_APP: app.py
  #   volumes:
  #     - ./services/ml/fraud_service:/app
  #   networks:
  #     - gigcare-net

  # Trigger Engine (Background Jobs)
  trigger-engine:
    build:
      context: ./services/trigger-engine
      dockerfile: Dockerfile
    container_name: gigcare-trigger-engine
    environment:
      DATABASE_URL: postgresql://gigcare_user:gigcare_pass@postgres:5432/gigcare
      NODE_ENV: development
      API_URL: http://api:3001
      INTERNAL_SERVICE_KEY: internal_service_key_change_me
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-none}
      WAQI_TOKEN: ${WAQI_TOKEN:-none}
      USE_MOCK_DATA: "true"
    depends_on:
      - postgres
      - api
    volumes:
      - ./services/trigger-engine:/app
      - /app/node_modules
    networks:
      - gigcare-net

volumes:
  postgres_data:

networks:
  gigcare-net:
    driver: bridge
